<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#050A18" />
  <title>Project Details — Aakash Tomar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" as="style">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <style>
    /* Detail Page Specifc Styles */
    .pd-container {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(10, 15, 30, 0.6);
      border: 1px solid rgba(245, 245, 245, 0.08);
      border-radius: 24px;
      padding: 3rem;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }
    
    @media (max-width: 760px) {
      .pd-container {
        padding: 1.5rem;
        border-radius: 16px;
      }
    }

    /* Fly-in Animation */
    .fly-in {
      opacity: 0;
      transform: translateY(40px) scale(0.98);
      animation: flyInAnim 0.8s cubic-bezier(0.2, 1, 0.2, 1) forwards;
      animation-delay: 0.2s; /* Give boot screen time */
    }

    @keyframes flyInAnim {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    #pdImage {
      width: 100%;
      height: auto;
      max-height: 480px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 2.5rem;
      border: 1px solid rgba(245, 245, 245, 0.05);
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    .pd-content {
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }
    
    .pd-section-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-top: 0;
      margin-bottom: 1.5rem;
      position: relative;
      padding-bottom: 0.75rem;
      letter-spacing: -0.01em;
    }
    .pd-section-title::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      width: 50px;
      height: 3px;
      background: var(--blue);
      border-radius: 2px;
    }

    #pdDesc {
      font-size: 1.15rem;
      line-height: 1.8;
      color: rgba(245, 245, 245, 0.85);
    }
    
    .pd-skills-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.2rem;
    }
    
    .pd-skills-header h3 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin: 0;
      letter-spacing: -0.01em;
    }
    
    .pd-skills-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(245, 245, 245, 0.1);
    }

    .pd-skills-card {
      background: rgba(10, 15, 30, 0.5);
      border: 1px solid rgba(245, 245, 245, 0.08);
      border-radius: 16px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    
    @media (min-width: 760px) {
      .pd-skills-card {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }
    }

    .pd-skills-card .proj-pill {
      font-size: 0.95rem;
      padding: 8px 16px;
      background: rgba(245, 245, 245, 0.05);
      border-color: rgba(245, 245, 245, 0.15);
      border-radius: 30px;
      transition: background 0.2s, border-color 0.2s;
    }
    
    .pd-skills-card .proj-pill:hover {
      background: rgba(245, 245, 245, 0.1);
      border-color: rgba(245, 245, 245, 0.3);
    }

    .pd-cta-wrapper {
      flex-shrink: 0;
    }
    
    .pd-cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 28px;
      background: var(--blue);
      color: #fff;
      font-weight: 600;
      font-size: 1.05rem;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }
    
    .pd-cta-btn:hover {
      background: #3B7BE0;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <!-- Startup Reveal -->
  <div class="startup-overlay" id="startupOverlay" aria-hidden="true">
    <canvas id="startupCanvas"></canvas>
    <div class="startup__brand">AAKASH</div>
  </div>

  <!-- Living Aurora Background -->
  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <div class="grain-overlay" aria-hidden="true"></div>

  <!-- Top Bar -->
  <header class="top-strip" id="topStrip">
    <a class="brand" href="index.html" aria-label="Go to home">
      <span class="brand__dot" aria-hidden="true"></span>
      <span class="brand__name">Aakash</span>
    </a>

    <nav class="top-nav" id="topNav" aria-label="Primary navigation">
      <a class="top-nav__item" href="projects.html">
        <span class="material-symbols-outlined nav-icon" style="font-size: 18px; margin-right: 6px; vertical-align: middle;">arrow_back</span>
        <span class="top-nav__text" style="vertical-align: middle;">Back to Projects</span>
      </a>
    </nav>

    <div class="top-strip__actions">
      <a class="btn btn--ghost btn--resume" href="resume/resume.pdf" target="_blank" rel="noopener">
        Resume PDF
      </a>
      <button class="nav-toggle" id="navToggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="topNav">
        <span class="nav-toggle__bars" aria-hidden="true"></span>
      </button>
    </div>
  </header>

  <div class="nav-scrim" id="navScrim" aria-hidden="true"></div>

  <main>
    <section class="section" data-section id="projectDetailSection" style="display: none;">
      <div class="container pd-container fly-in">
        <header class="section__head text-center" style="margin-bottom: 2rem;">
          <h2 class="section__title" id="pdTitle">Loading...</h2>
          <span class="proj-card__badge" id="pdBadge" style="margin-top: 15px; display: inline-block;"></span>
        </header>
        
        <img id="pdImage" src="" alt="Project Hero" loading="lazy" />
        
        <div class="pd-content">
          <!-- Overview -->
          <div class="pd-overview">
            <h3 class="pd-section-title">Project Overview</h3>
            <div id="pdDesc"></div>
          </div>
          
          <!-- Tech Stack & Links -->
          <div class="pd-tech-stack">
            <div class="pd-skills-header">
              <h3>Tech Stack</h3>
            </div>
            <div class="pd-skills-card">
              <div class="proj-card__pills" id="pdSkillsList" style="flex: 1; gap: 10px;"></div>
              
              <div class="pd-cta-wrapper">
                <a id="pdGithubLink" href="#" class="pd-cta-btn" target="_blank" rel="noopener">
                  <svg style="width:24px;height:24px" viewBox="0 0 24 24" fill="currentColor">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
                  </svg>
                  Source Code
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__grid">
      <div class="mono muted">© <span id="year"></span> Aakash Tomar</div>
    </div>
  </footer>

  <script src="assets/js/main.js" defer></script>
</body>
</html>
